<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – CPMS Evaluation Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1d23 0%, #2d3239 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 1rem;
            box-shadow: 0 8px 40px rgba(0,0,0,.25);
        }
        .login-header {
            background: #1a1d23;
            color: #fff;
            border-radius: 1rem 1rem 0 0;
            padding: 2rem 2rem 1.5rem;
            text-align: center;
        }
        .login-header i { color: #0d6efd; font-size: 2rem; }
        .login-body { padding: 2rem; }
        .form-floating > .form-control:focus ~ label { color: #0d6efd; }
        .toast-container { position: fixed; bottom: 1rem; right: 1rem; z-index: 9999; }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="toast-container">
        {% for category, message in messages %}
        <div class="toast show align-items-center text-bg-{{ category }} border-0" role="alert">
            <div class="d-flex">
                <div class="toast-body">{{ message }}</div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
            </div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="card login-card">
        <div class="login-header">
            <i class="bi bi-ev-station"></i>
            <h4 class="mt-2 mb-0">CPMS Evaluation Platform</h4>
            <small class="text-white-50">Sign in to continue</small>
        </div>
        <div class="login-body">
            <form method="POST" action="{{ url_for('login') }}">
                <div class="form-floating mb-3">
                    <input type="email" class="form-control" id="email" name="email"
                           placeholder="email@example.com" required autofocus
                           value="{{ request.form.get('email', '') }}">
                    <label for="email"><i class="bi bi-envelope me-1"></i>Email address</label>
                </div>
                <div class="form-floating mb-3">
                    <input type="password" class="form-control" id="password" name="password"
                           placeholder="Password" required>
                    <label for="password"><i class="bi bi-lock me-1"></i>Password</label>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="remember" name="remember" value="1">
                    <label class="form-check-label" for="remember">Remember me</label>
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-box-arrow-in-right me-1"></i>Sign In
                    </button>
                </div>
            </form>
            <hr>
            <p class="text-center text-muted mb-0">
                Don't have an account?
                <a href="{{ url_for('register') }}" class="text-decoration-none fw-medium">Register</a>
            </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.toast.show').forEach(t => {
            setTimeout(() => { t.classList.remove('show'); t.remove(); }, 5000);
        });
    </script>
</body>
</html>
