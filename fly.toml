# Fly.io configuration for CPMS Evaluation Platform
# App name will be set by `fly launch` – update the value below after running it
app = "cpms-platform"
primary_region = "lhr"  # London – change to nearest: ams, cdg, fra, mad, etc.

[build]
  dockerfile = "platform/Dockerfile"

[env]
  PORT = "5000"
  CPMS_DB_PATH = "/data/instance/cpms.db"
  CPMS_UPLOAD_FOLDER = "/data/uploads"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = false   # keep alive (important for SQLite)
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 50
    soft_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "cpms_data"
  destination = "/data"
  initial_size = "3gb"
